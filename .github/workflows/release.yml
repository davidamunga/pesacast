name: Release

on:
  push:
    tags:
      - "pesacast@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. pesacast@1.0.0) — leave blank to use current version in desktop/package.json"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      version: ${{ steps.tag.outputs.version }}
      ref: ${{ steps.tag.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            REF="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./desktop/package.json').version")
            REF="pesacast@${VERSION}"
          else
            REF="${{ github.ref_name }}"
          fi
          echo "version=${REF#pesacast@}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          REPO="${{ github.repository }}"

          # Extract the changelog block for this version
          NOTES=$(awk -v ver="$VERSION" '
            /^## / { if (found) exit; if (index($0, ver)) found=1; next }
            found { print }
          ' desktop/CHANGELOG.md | sed '/^[[:space:]]*$/d')

          {
            echo "## What's new"
            echo ""
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
            else
              echo "See [CHANGELOG.md](https://github.com/${REPO}/blob/main/desktop/CHANGELOG.md) for details."
            fi
            echo ""
            echo "---"
            echo ""
            echo "**Desktop** — download the installer for your platform below."
            echo "The app will check for future updates automatically."
            echo ""
            echo "**Android** — download and install \`pesacast-${VERSION}.apk\`."
          } > /tmp/release_body.md

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: "PesaCast v${{ steps.tag.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: /tmp/release_body.md

  build-android:
    name: Build Android APK
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > "${{ github.workspace }}/android/app/keystore.jks"

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/pesacast-${VERSION}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.ref }}
          files: android/app/build/outputs/apk/release/pesacast-${{ needs.create-release.outputs.version }}.apk

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri-args }}
          projectPath: desktop
          updaterJsonPreferNsis: false
          includeUpdaterJson: true
