name: Release

on:
  push:
    tags:
      - "pesacast@*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. pesacast@1.0.0) — leave blank to use current version in desktop/package.json"
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      version: ${{ steps.tag.outputs.version }}
      ref: ${{ steps.tag.outputs.ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            REF="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(node -p "require('./desktop/package.json').version")
            REF="pesacast@${VERSION}"
          else
            REF="${{ github.ref_name }}"
          fi
          echo "version=${REF#pesacast@}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.ref }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          # Extract the changelog block for this version
          NOTES=$(awk -v ver="$VERSION" '
            /^## / { if (found) exit; if (index($0, ver)) found=1; next }
            found { print }
          ' desktop/CHANGELOG.md | sed '/^[[:space:]]*$/d')

          {
            echo "## What's New"
            echo ""
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
            else
              echo "See [CHANGELOG.md](https://github.com/${REPO}/blob/main/desktop/CHANGELOG.md) for details."
            fi
            echo ""
            echo "---"
            echo ""
            echo "## Downloads"
            echo ""
            echo "### Desktop"
            echo ""
            echo "| Platform | Installer |"
            echo "|----------|-----------|"
            echo "| macOS (Apple Silicon + Intel Universal) | [pesacast_${VERSION}_universal.dmg](${BASE}/pesacast_${VERSION}_universal.dmg) |"
            echo "| Windows x64 — Setup wizard | [pesacast_${VERSION}_x64-setup.exe](${BASE}/pesacast_${VERSION}_x64-setup.exe) |"
            echo "| Windows x64 — MSI | [pesacast_${VERSION}_x64_en-US.msi](${BASE}/pesacast_${VERSION}_x64_en-US.msi) |"
            echo ""
            echo "> The app checks for updates automatically. No manual re-installation needed for future releases."
            echo ""
            echo "### Android"
            echo ""
            echo "| Platform | Package |"
            echo "|----------|---------|"
            echo "| Android (APK) | [pesacast-${VERSION}.apk](${BASE}/pesacast-${VERSION}.apk) |"
          } > /tmp/release_body.md

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: "PesaCast v${{ steps.tag.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: /tmp/release_body.md

  build-android:
    name: Build Android APK
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > "${{ github.workspace }}/android/app/keystore.jks"

      - name: Build release APK
        working-directory: android
        run: ./gradlew :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/pesacast-${VERSION}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.ref }}
          files: android/app/build/outputs/apk/release/pesacast-${{ needs.create-release.outputs.version }}.apk

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    needs: create-release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri-args }}
          projectPath: desktop
          includeUpdaterJson: false

      - name: Sign and upload updater bundles
        shell: bash
        working-directory: desktop
        run: |
          TAG="${{ needs.create-release.outputs.ref }}"
          REPO="${{ github.repository }}"
          VERSION="${{ needs.create-release.outputs.version }}"

          sign_and_upload() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "⚠️  Skipping (not found): $file"
              return 1
            fi
            echo "🔏 Signing $file..."
            SIGN_ARGS=(--private-key "$TAURI_SIGNING_PRIVATE_KEY")
            [ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ] && SIGN_ARGS+=(--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD")
            pnpm tauri signer sign "$file" "${SIGN_ARGS[@]}"
            gh release upload "$TAG" "${file}.sig" --clobber -R "$REPO"
            echo "✅ Uploaded $(basename "${file}.sig")"
          }

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            TARBALL="src-tauri/target/universal-apple-darwin/release/bundle/macos/pesacast.app.tar.gz"
            sign_and_upload "$TARBALL" || { echo "❌ macOS tarball not found" && exit 1; }

          elif [[ "${{ matrix.platform }}" == "windows-latest" ]]; then
            NSIS_EXE="src-tauri/target/release/bundle/nsis/pesacast_${VERSION}_x64-setup.exe"
            MSI_FILE="src-tauri/target/release/bundle/msi/pesacast_${VERSION}_x64_en-US.msi"
            NSIS_ZIP="src-tauri/target/release/bundle/nsis/pesacast_${VERSION}_x64-setup.nsis.zip"
            MSI_ZIP="src-tauri/target/release/bundle/msi/pesacast_${VERSION}_x64_en-US.msi.zip"

            # tauri-action only creates these zip bundles when includeUpdaterJson: true,
            if [ -f "$NSIS_EXE" ]; then
              (cd "$(dirname "$NSIS_EXE")" && 7z a "$(basename "$NSIS_ZIP")" "$(basename "$NSIS_EXE")")
              echo "📦 Created NSIS zip bundle"
            fi
            if [ -f "$MSI_FILE" ]; then
              (cd "$(dirname "$MSI_FILE")" && 7z a "$(basename "$MSI_ZIP")" "$(basename "$MSI_FILE")")
              echo "📦 Created MSI zip bundle"
            fi

            FOUND=0
            for zip in "$NSIS_ZIP" "$MSI_ZIP"; do
              if [ -f "$zip" ]; then
                SIGN_ARGS=(--private-key "$TAURI_SIGNING_PRIVATE_KEY")
                [ -n "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ] && SIGN_ARGS+=(--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD")
                pnpm tauri signer sign "$zip" "${SIGN_ARGS[@]}"
                gh release upload "$TAG" "$zip" --clobber -R "$REPO"
                gh release upload "$TAG" "${zip}.sig" --clobber -R "$REPO"
                echo "✅ Uploaded $(basename "$zip") + sig"
                FOUND=$((FOUND + 1))
              fi
            done

            if [ "$FOUND" -eq 0 ]; then
              echo "❌ No Windows updater zip bundles created" && exit 1
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  generate-updater-json:
    name: Generate Updater JSON
    needs: [create-release, build-desktop]
    if: needs.build-desktop.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Generate and upload latest.json
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          TAG="${{ needs.create-release.outputs.ref }}"
          REPO="${{ github.repository }}"

          echo "⏳ Waiting for release assets to be processed..."
          sleep 15

          # Download signature files
          mkdir -p signatures

          # macOS universal — both arch slots share the same universal binary
          gh release download "$TAG" \
            -p "pesacast.app.tar.gz.sig" \
            -D signatures \
            -R "$REPO" 2>/dev/null || echo "⚠️  macOS sig not found"

          # Windows — prefer MSI, fall back to NSIS
          gh release download "$TAG" \
            -p "pesacast_${VERSION}_x64_en-US.msi.zip.sig" \
            -D signatures \
            -R "$REPO" 2>/dev/null || true

          gh release download "$TAG" \
            -p "pesacast_${VERSION}_x64-setup.nsis.zip.sig" \
            -D signatures \
            -R "$REPO" 2>/dev/null || true

          DARWIN_SIG=$(cat "signatures/pesacast.app.tar.gz.sig" 2>/dev/null || echo "")
          WINDOWS_MSI_SIG=$(cat "signatures/pesacast_${VERSION}_x64_en-US.msi.zip.sig" 2>/dev/null || echo "")
          WINDOWS_NSIS_SIG=$(cat "signatures/pesacast_${VERSION}_x64-setup.nsis.zip.sig" 2>/dev/null || echo "")

          # Prefer MSI; fall back to NSIS
          if [ -n "$WINDOWS_MSI_SIG" ]; then
            WINDOWS_SIG="$WINDOWS_MSI_SIG"
            WINDOWS_URL="https://github.com/${REPO}/releases/download/${TAG}/pesacast_${VERSION}_x64_en-US.msi.zip"
            echo "✅ Using MSI signature for Windows"
          else
            WINDOWS_SIG="$WINDOWS_NSIS_SIG"
            WINDOWS_URL="https://github.com/${REPO}/releases/download/${TAG}/pesacast_${VERSION}_x64-setup.nsis.zip"
            echo "✅ Using NSIS signature for Windows (MSI not found)"
          fi

          DARWIN_URL="https://github.com/${REPO}/releases/download/${TAG}/pesacast_universal.app.tar.gz"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "PesaCast v${VERSION} — see https://github.com/${REPO}/releases/tag/${TAG} for full release notes." \
            --arg pub_date "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" \
            --arg darwin_url "$DARWIN_URL" \
            --arg darwin_sig "$DARWIN_SIG" \
            --arg windows_url "$WINDOWS_URL" \
            --arg windows_sig "$WINDOWS_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_sig, url: $darwin_url },
                "darwin-x86_64":  { signature: $darwin_sig, url: $darwin_url },
                "windows-x86_64": { signature: $windows_sig, url: $windows_url }
              }
            }' > latest.json

          echo "📄 Generated latest.json:"
          cat latest.json

          gh release upload "$TAG" latest.json --clobber -R "$REPO"
          echo "✅ latest.json uploaded to release $TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
